version: 2
updates:
  # Updates for production dependencies. Currently excludes test dependencies and maven plugins.
  - package-ecosystem: "maven"
    directories:
      - "/src/**"
    target-branch: "main"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "Europe/Rome"
    groups:
      maven-deps:
        group-by: dependency-name  
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    pull-request-branch-name:
      separator: "-"
    allow:
      - dependency-type: "production"
    ignore:
      - dependency-name: "org.apache.maven.plugins:*"
      - dependency-name: "org.codehaus.mojo:*"
      - dependency-name: "*:*maven-plugin*"
      - dependency-name: "org.xmlunit:xmlunit-matchers"
      # Keep Java 17-compatible tool versions; newer releases require Java 21.
      - dependency-name: "com.google.errorprone:error_prone_core"
        versions: [ "[2.43.0,)" ]
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        versions: [ "[13.0.0,)" ]

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: 'main'
    open-pull-requests-limit: 10

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: '2.28.x'
    open-pull-requests-limit: 10

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    target-branch: '2.27.x'
    open-pull-requests-limit: 10
