(function() {
  var host = location.hostname;
  if (host === '127.0.0.1' || host === 'localhost' || host === '[::1]') {
    var versionData = JSON.stringify({
      default: 'latest',
      versions: [
        { version: 'latest', title: 'Latest', aliases: ['main', '3.0.x'], archive: false }
      ]
    });

    function isVersionsJson(url) {
      return typeof url === 'string' && url.indexOf('/versions.json') !== -1;
    }

    if (window.fetch) {
      var originalFetch = window.fetch.bind(window);

        var url = typeof resource === 'string' ? resource : resource && resource.url;

            status: 200,
            headers: { 'Content-Type': 'application/json' }
          }));
        }
        return originalFetch(resource, options);
      };
    }

    if (window.XMLHttpRequest) {
      var originalOpen = XMLHttpRequest.prototype.open;
      var originalSend = XMLHttpRequest.prototype.send;
      XMLHttpRequest.prototype.open = function(method, url) {
        this.__versionsJsonDisabled = isVersionsJson(url);
        return originalOpen.apply(this, arguments);
      };
      XMLHttpRequest.prototype.send = function(body) {
        if (this.__versionsJsonDisabled) {
          this.readyState = 4;
          this.status = 200;
          this.responseText = versionData;
          this.response = versionData;
