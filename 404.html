<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found · GeoServer Documentation</title>
  <link rel="stylesheet" href="/latest/stylesheets/geoserver-brand.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      max-width: 640px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    h1 { font-size: 5rem; margin: 0 0 .25rem; color: var(--gs-brand-primary, #1976d2); line-height: 1; }
    h2 { font-size: 1.4rem; margin: 0 0 1.5rem; font-weight: 500; }
    #redirect-box {
      background: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 6px;
      padding: 1.25rem 1rem;
      margin: 1.5rem 0;
    }
    #redirect-box p { margin: .4rem 0; font-size: .95rem; }
    #redirect-link { color: var(--gs-brand-link, #1565c0); word-break: break-all; }
    .actions { margin-top: 1rem; display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; }
    button {
      padding: .5rem 1.25rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: .9rem;
    }
    #btn-go  { background: var(--gs-brand-primary, #1976d2); color: #fff; }
    #btn-go:hover { background: var(--gs-brand-primary-dark, #1565c0); }
    #btn-cancel { background: #e0e0e0; color: #333; }
    #btn-cancel:hover { background: #bdbdbd; }
    .note { font-size: .8rem; color: #777; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <h2>Page not found on this server</h2>
    <div id="redirect-box">
      <p>This looks like a link to archived GeoServer documentation.</p>
      <p>Redirecting to <a id="redirect-link" href="#"></a></p>
      <p>in <strong><span id="countdown">5</span></strong> second(s)&hellip;</p>
      <div class="actions">
        <button id="btn-go"     onclick="doRedirect()">Go now</button>
        <button id="btn-cancel" onclick="cancelRedirect()">Stay here</button>
      </div>
    </div>
    <p class="note">If you followed an internal link that should exist on this site,
      please <a href="https://github.com/geoserver/geoserver/tree/main/doc/en">submit a fix</a>.</p>
  </div>
  <script>
    // Change this when the archive moves to docs-archive.geoserver.org
    var ARCHIVE_HOST = 'https://docs.geoserver.org';

    // Known version prefixes served by this site — do NOT redirect these
    var LOCAL_PREFIXES = ['/latest/', '/main/', '/3.0.x/'];

    var path = window.location.pathname;
    var isLocal = LOCAL_PREFIXES.some(function (p) {
      return path.indexOf(p) === 0 || path === p.slice(0, -1);
    });

    var redirectUrl = ARCHIVE_HOST + path + window.location.search + window.location.hash;

    var linkEl      = document.getElementById('redirect-link');
    var countdownEl = document.getElementById('countdown');
    var redirectBox = document.getElementById('redirect-box');

    linkEl.href        = redirectUrl;
    linkEl.textContent = redirectUrl;

    var seconds = 5;
    var timer;

    if (isLocal) {
      // For /latest/, a .html URL very likely maps to a trailing-slash URL in the new MkDocs build
      if (path.indexOf('/latest/') === 0 && path.slice(-5) === '.html') {
        window.location.replace(
          path.slice(0, -5) + '/' + window.location.search + window.location.hash
        );
      } else {
        // Path should exist here but doesn't — don't auto-redirect to archive
        redirectBox.innerHTML =
          '<p>This page does not exist on this server.</p>' +
          '<p>Try the <a href="/latest/">Latest documentation</a> home page.</p>';
      }
    } else {
      timer = setInterval(function () {
        seconds--;
        countdownEl.textContent = seconds;
        if (seconds <= 0) { clearInterval(timer); doRedirect(); }
      }, 1000);
    }

    function doRedirect() {
      clearInterval(timer);
      window.location.replace(redirectUrl);
    }

    function cancelRedirect() {
      clearInterval(timer);
      redirectBox.innerHTML =
        '<p>Redirect cancelled.</p>' +
        '<p>You can visit <a href="' + redirectUrl + '">' + redirectUrl + '</a> manually, ' +
        'or go to the <a href="/latest/">Latest documentation</a>.</p>';
    }
  </script>
</body>
</html>
