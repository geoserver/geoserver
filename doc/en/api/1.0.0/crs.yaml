---
swagger: '2.0'
info:
  version: 1.0.0
  title: GeoServer CoordinateReferenceSystems
  description: REST API for listing and retrieving Coordinate Reference Systems (CRS) available in GeoServer
  contact:
    name: GeoServer
    email: 'geoserver-users@osgeo.org'
    url: 'https://geoserver.org/comm/'
host: localhost:8080
basePath: /geoserver/rest

paths:
  /crs:
    get:
      operationId: crsList
      tags:
       - "CRS"
      summary: List CRS IDs
      description: >
        Returns a paginated list of CRS identifiers with links to their definitions.
      parameters:
        - name: authority
          in: query
          description: Filter CRS by authority (e.g. EPSG)
          required: false
          type: string
        - name: offset
          in: query
          description: Starting index for pagination
          required: false
          type: integer
          default: 0
          minimum: 0
        - name: limit
          in: query
          description: Maximum number of results to return
          required: false
          type: integer
          default: 50
          minimum: 1
          maximum: 200
      produces:
        - application/json
      responses:
        200:
          description: Paginated CRS list
          schema:
            $ref: '#/definitions/Codes'
          examples:
            application/json: |
              {
                "crs": [
                  {
                    "id": "EPSG:2010",
                    "href": "http://localhost:8080/geoserver/rest/crs/EPSG:2010.wkt"
                  },
                  {
                    "id": "EPSG:2011",
                    "href": "http://localhost:8080/geoserver/rest/crs/EPSG:2011.wkt"
                  },
                  {
                    "id": "EPSG:2012",
                    "href": "http://localhost:8080/geoserver/rest/crs/EPSG:2012.wkt"
                  },
                  {
                    "id": "EPSG:2013",
                    "href": "http://localhost:8080/geoserver/rest/crs/EPSG:2013.wkt"
                  },
                  {
                    "id": "EPSG:2014",
                    "href": "http://localhost:8080/geoserver/rest/crs/EPSG:2014.wkt"
                  }
                ],
                "page": {
                  "limit": 5,
                  "offset": 13,
                  "returned": 5,
                  "total": 8313
                }
              }
            
        400:
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/definitions/ErrorResponse'

  /crs/{identifier}:
    get:
      operationId: getCrsByIdentifier
      tags:
       - "CRS"
      summary: Get CRS by ID
      description: >
        Returns the CRS definition. By default, return the definition in a JSON containing the code, format (wkt) and the WKT definition. Append .wkt to the request to get the WKT definition directly
      produces:
        - application/json
        - text/plain
      parameters:
        - name: identifier
          in: path
          required: true
          description: CRS identifier in the form AUTHORITY:CODE (e.g. EPSG:4326)
          type: string
      responses:
        200:
          description: CRS definition
          schema:
            $ref: '#/definitions/DefinitionResponse'
          examples:
            application/json: |
              {
                "id": "EPSG:2010",
                "format": "wkt",
                "definition": "PROJCS[\"NAD27(CGQ77) / SCoPQ zone 4\", \r\n  GEOGCS[\"NAD27(CGQ77)\", \r\n    DATUM[\"North American Datum 1927 (CGQ77)\", \r\n      SPHEROID[\"Clarke 1866\", 6378206.4, 294.9786982138982, AUTHORITY[\"EPSG\",\"7008\"]], \r\n      AUTHORITY[\"EPSG\",\"6609\"]], \r\n    PRIMEM[\"Greenwich\", 0.0, AUTHORITY[\"EPSG\",\"8901\"]], \r\n    UNIT[\"degree\", 0.017453292519943295], \r\n    AXIS[\"Geodetic longitude\", EAST], \r\n    AXIS[\"Geodetic latitude\", NORTH], \r\n    AUTHORITY[\"EPSG\",\"4609\"]], \r\n  PROJECTION[\"Transverse_Mercator\", AUTHORITY[\"EPSG\",\"9807\"]], \r\n  PARAMETER[\"central_meridian\", -61.5], \r\n  PARAMETER[\"latitude_of_origin\", 0.0], \r\n  PARAMETER[\"scale_factor\", 0.9999], \r\n  PARAMETER[\"false_easting\", 304800.0], \r\n  PARAMETER[\"false_northing\", 0.0], \r\n  UNIT[\"m\", 1.0], \r\n  AXIS[\"Easting\", EAST], \r\n  AXIS[\"Northing\", NORTH], \r\n  AUTHORITY[\"EPSG\",\"2010\"]]"
              }
            text/plain: |
                PROJCS["NAD27(CGQ77) / SCoPQ zone 4", 
                  GEOGCS["NAD27(CGQ77)", 
                    DATUM["North American Datum 1927 (CGQ77)", 
                        SPHEROID["Clarke 1866", 6378206.4, 294.9786982138982, AUTHORITY["EPSG","7008"]], 
                        AUTHORITY["EPSG","6609"]], 
                      PRIMEM["Greenwich", 0.0, AUTHORITY["EPSG","8901"]], 
                      UNIT["degree", 0.017453292519943295], 
                      AXIS["Geodetic longitude", EAST], 
                      AXIS["Geodetic latitude", NORTH], 
                      AUTHORITY["EPSG","4609"]], 
                  PROJECTION["Transverse_Mercator", AUTHORITY["EPSG","9807"]], 
                  PARAMETER["central_meridian", -61.5], 
                  PARAMETER["latitude_of_origin", 0.0], 
                  PARAMETER["scale_factor", 0.9999], 
                  PARAMETER["false_easting", 304800.0], 
                  PARAMETER["false_northing", 0.0], 
                  UNIT["m", 1.0], 
                  AXIS["Easting", EAST], 
                  AXIS["Northing", NORTH], 
                  AUTHORITY["EPSG","2010"]]
            
        400:
          description: Invalid CRS identifier
          content:
            application/json:
              schema:
                $ref: '#/definitions/ErrorResponse'
            
        404:
          description: CRS not found
          content:
            application/json:
              schema:
                $ref: '#/definitions/ErrorResponse'

  /crs/authorities:
    get:
      operationId: authoritiesList
      tags:
       - "Authorities"
      summary: List Authorities
      description: >
        Returns a List of CRS Authorities.
      produces:
        - application/json
      responses:
        200:
          description: Authorities list
          schema:
            $ref: '#/definitions/AuthoritiesResponse'
          examples:
            application/json: |
              {
                "authorities": [
                  {
                  "name": "CRS",
                  "href": "http://localhost:8080/geoserver/rest/crs?authority=CRS"
                  },
                  {
                  "name": "EPSG",
                  "href": "http://localhost:8080/geoserver/rest/crs?authority=EPSG"
                  },
                  {
                  "name": "TestAuthority",
                  "href": "http://localhost:8080/geoserver/rest/crs?authority=TestAuthority"
                  }

                ]
              }
definitions:
  CRSLink:
    type: object
    properties:
      id:
        type: string
        example: EPSG:4326
      href:
        type: string
        example: http://localhost:8080/geoserver/rest/crs/EPSG:4326.wkt
    required:
      - id
      - href

  Authority:
    type: object
    properties:
      name:
        type: string
        example: EPSG
      href:
        type: string
        example: http://localhost:8080/geoserver/rest/crs?authority=EPSG
    required:
      - name
      - href

  PageInfo:
    type: object
    properties:
      offset:
        type: integer
        example: 0
      limit:
        type: integer
        example: 25
      returned:
        type: integer
        example: 25
      total:
        type: integer
        example: 1000
    required:
      - offset
      - limit
      - returned
      - total

  Codes:
    type: object
    properties:
      crs:
        type: array
        items:
          $ref: '#/definitions/CRSLink'
      page:
        $ref: '#/definitions/PageInfo'
    required:
      - crs
      - page

  AuthoritiesResponse:
    type: object
    properties:
      authority:
        type: array
        items:
          $ref: '#/definitions/Authority'
    required:
      - authority

  DefinitionResponse:
    type: object
    properties:
      id:
        type: string
        example: EPSG:4326
      format:
        type: string
        example: wkt
      definition:
        type: string
        example: GEOGCS["WGS 84", ...]
    required:
      - id
      - format
      - definition

  ErrorResponse:
    type: object
    properties:
      error:
        type: string
        example: CRS not found
      message:
        type: string
        example: CRS not found EPSG:999999