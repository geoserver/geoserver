site_name: GeoServer User Manual
site_url: https://docs.geoserver.org/3.0/en/user/
repo_url: https://github.com/geoserver/geoserver
repo_name: geoserver/geoserver
edit_uri: edit/main/doc/en/user/docs/

docs_dir: docs
site_dir: target/html

# Exclude include files from the build (they are included by other pages)
exclude_docs: |
  styling/ysld/reference/symbolizers/include/

theme:
  name: material
  custom_dir: ../../themes/geoserver
  logo: img/geoserver-logo.png
  favicon: img/geoserver.ico
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

extra:
  doc_type: "user"
  doc_switcher:
    - label: "User Manual"
      url: "../user/"
      type: "user"
    - label: "Developer Manual"
      url: "../developer/"
      type: "developer"
    - label: "Documentation Guide"
      url: "../docguide/"
      type: "docguide"
    - label: "Swagger APIs"
      url: "../user/api/"
      type: "swagger"
  version_selector:
    - version: latest
      title: Latest (3.0)
      aliases: []
    - version: "3.0"
      title: "3.0"
      aliases: []
    - version: "2.28.x"
      title: "2.28.x"
      aliases: []
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/geoserver/geoserver
    - icon: fontawesome/solid/globe
      link: https://geoserver.org

plugins:
  - search:
      lang: en
  - macros:
      render_by_default: true
      include_dir: docs
      module_name: ../../version

hooks:
  - ../../download_files.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

