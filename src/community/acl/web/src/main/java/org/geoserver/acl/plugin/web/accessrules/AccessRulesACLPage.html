<html xmlns:wicket="http://wicket.apache.org/">
<head>
</head>
<body>
<wicket:extend>
    <div wicket:id="simulatorPanel"></div>
    <div wicket:id="rulesPanel"></div>
    
    <wicket:fragment wicket:id="header">
      <div class="gs-unordered-list-class action-group">
        <div class="gs-list-item-class"> <a class="add-link" href="#" wicket:id="addNew"><wicket:message key="addNew" /></a></div>
        <div class="gs-list-item-class"> <a class="remove-link" href="#" wicket:id="removeSelected"><wicket:message key="removeSelected" /></a></div>
        <div class="gs-list-item-class"> <a class="cog-link" href="#" wicket:id="simulator"><wicket:message key="simulate" /></a></div>
      </div>
    </wicket:fragment>
</wicket:extend>
</body>
</html>
