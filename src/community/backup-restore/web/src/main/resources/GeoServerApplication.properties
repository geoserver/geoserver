# Backup option hints (shown as hover tooltips)
BackupRestoreDataPage.backupOptOverwirteHint=Replace the target archive file if one already exists at that path. Leave off to avoid accidentally overwriting a previous backup.
BackupRestoreDataPage.backupOptBestEffortHint=Keep going when a resource fails instead of aborting the whole backup. Use it to obtain a partial backup from a catalog that has some broken layers or stores, then review the warnings in the execution summary.
BackupRestoreDataPage.backupOptCleanTempHint=Delete the temporary working folder when the job finishes. Leave it on; turn off only if you need to inspect the intermediate files while troubleshooting.
BackupRestoreDataPage.backupOptSkipGWCHint=Exclude the GeoWebCache configuration and tile-layer folders from the archive. Use when you only want catalog and configuration, not the tile-cache settings.
BackupRestoreDataPage.backupOptParamPasswordsHint=Write store passwords as substitutable tokens instead of the encrypted values, so the archive can be restored into an environment that uses different credentials. Supply the replacements with the BK_PASSWORD_TOKENS option on restore.
BackupRestoreDataPage.backupOptPreserveIdsHint=Keep internal catalog IDs and reference objects by ID. Turn this on only to migrate the archive into another, already-populated GeoServer; leave it off for a portable backup that will be restored into an empty data directory.
BackupRestoreDataPage.backupOptSkipSecurityHint=Exclude the security configuration (users, groups, roles, authentication) from the archive. Checked by default. Uncheck only when you deliberately want to back up security settings.
BackupRestoreDataPage.backupOptSkipSettingsHint=Exclude the global settings (contact info, JAI, service defaults, ...) from the archive. Checked by default. Uncheck to include them.
