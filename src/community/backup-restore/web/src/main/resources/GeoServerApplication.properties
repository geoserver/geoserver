# Restore option hints (shown as hover tooltips)
BackupRestoreDataPage.restoreOptDryRunHint=Validate the archive and report what would happen without changing anything. Always run a Dry-Run first to catch problems before a real restore.
BackupRestoreDataPage.restoreOptBestEffortHint=Keep going when a resource fails instead of aborting the whole restore. Use it to restore as much as possible from a partially broken archive, then review the warnings in the execution summary.
BackupRestoreDataPage.restoreOptCleanTempHint=Delete the temporary working folder when the job finishes. Leave it on; turn off only when troubleshooting.
BackupRestoreDataPage.restoreOptSkipGWCHint=Do not restore the GeoWebCache configuration and tile-layer folders, leaving the target's tile-cache settings untouched.
BackupRestoreDataPage.restoreOptSkipSecurityHint=Do not restore the security configuration. Checked by default. Uncheck only when the archive contains a security folder you intend to apply — this replaces the target's users, groups, roles and authentication.
BackupRestoreDataPage.restoreOptSkipSettingsHint=Do not restore the global settings. Checked by default. Uncheck to overwrite the target's global settings with those in the archive.
BackupRestoreDataPage.restoreOptPurgeResourcesHint=Delete existing resources where possible before restoring (e.g. drop existing workspaces). Checked by default. Uncheck to merge the archive into the current catalog without deleting anything.
