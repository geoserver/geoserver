<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-GraticulePanel">
        <div class="gs-unordered-list-class">
          <div class="gs-list-item-class">
            <label>
              <wicket:message key="bounds">Bounds</wicket:message>
            </label>
            <div wicket:id="bounds" class="selfclear"/>
          </div>
          <div class="gs-list-item-class">
            <input wicket:id="generateBoundsFromCRS" type="submit" wicket:message="value:generateBoundsFromSRS"/>
          </div>
          <div class="gs-list-item-class">
            <span id="steps" wicket:id="steps"/>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
