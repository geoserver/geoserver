<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <wicket:panel>
      <div class="gs-panel-LibdeflateSettingsPanel">
        <fieldset>
          <legend>
            <span>
              <wicket:message key="Libdeflate.advancedSettingsTitle">Libdeflate Plugin Settings</wicket:message>
            </span>
          </legend>
          <div wicket:id="container">
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="compressionPriority" class="text">
                  <wicket:message key="Libdeflate.compressionPriority">Compression priority</wicket:message>
                </label>
                <input id="compressionPriority" type="text" wicket:id="compressionPriority" class="w-sm"/>
              </div>
              <div class="gs-form-group">
                <label for="decompressionPriority" class="text">
                  <wicket:message key="Libdeflate.decompressionPriority">Decompression priority</wicket:message>
                </label>
                <input id="decompressionPriority" type="text" wicket:id="decompressionPriority" class="w-sm"/>
              </div>
              <div class="gs-form-group">
                <label for="minLevel" class="text">
                  <wicket:message key="Libdeflate.minLevel">Minimum supported Compression Level</wicket:message>
                </label>
                <input id="minLevel" type="text" wicket:id="minLevel" class="w-sm"/>
              </div>
              <div class="gs-form-group">
                <label for="maxLevel" class="text">
                  <wicket:message key="Libdeflate.maxLevel">Maximum supported Compression Level</wicket:message>
                </label>
                <input id="maxLevel" type="text" wicket:id="maxLevel" class="w-sm"/>
              </div>
            </div>
          </div>
        </fieldset>
      </div>
    </wicket:panel>
  </body>
</html>
