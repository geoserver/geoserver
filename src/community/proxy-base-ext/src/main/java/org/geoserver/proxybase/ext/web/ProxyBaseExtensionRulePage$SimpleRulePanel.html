<?xml version="1.0"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-ProxyBaseExtensionRulePage_SimpleRulePanel">
        <fieldset>
          <div class="gs-form">
            <div class="gs-form-group">
              <label for="position">
                <wicket:message key="position"></wicket:message>
              </label>
              <div class="gs-form-group-content">
                <input id="position" wicket:id="position" type="number" class="w-sm" />
                <span class="gs-form-help">
                  <wicket:message key="positionDescription"></wicket:message>
                </span>
              </div>
            </div>
            <div class="gs-form-group">
              <label for="matcher">
                <wicket:message key="matcher"></wicket:message>
              </label>
              <div class="gs-form-group-content">
                <input id="matcher" wicket:id="matcher" type="text" />
                <span class="gs-form-help">
                  <wicket:message key="matcherDescription"></wicket:message>
                </span>
              </div>
            </div>
            <div class="gs-form-group">
              <label for="transformer">
                <wicket:message key="transformer"></wicket:message>
              </label>
              <div class="gs-form-group-content">
                <input id="transformer" wicket:id="transformer" type="text" />
                <span class="gs-form-help">
                  <wicket:message key="transformerDescription"></wicket:message>
                </span>
              </div>
            </div>
          </div>
        </fieldset>
      </div>
    </wicket:panel>
  </body>
</html>
