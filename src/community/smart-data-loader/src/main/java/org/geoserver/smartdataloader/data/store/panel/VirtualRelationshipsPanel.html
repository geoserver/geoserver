<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-VirtualRelationshipsPanel">
        <fieldset class="virtual-relationships-panel">
          <legend>
            <wicket:message key="VirtualRelationshipsPanel.title">Virtual relationships</wicket:message>
          </legend>
          <div class="gs-form">
            <div wicket:id="feedback"/>
            <div wicket:id="toolbar" class="virtual-relationships-toolbar">
              <a href="#" wicket:id="addLink" class="button">
                <i class="gs-icon gs-icon-add"></i> <wicket:message key="VirtualRelationshipsPanel.add">Add virtual relationship</wicket:message>
              </a>
            </div>
            <div wicket:id="emptyContainer" class="virtual-relationships-empty">
              <wicket:message key="VirtualRelationshipsPanel.empty">No virtual relationships defined.</wicket:message>
            </div>
            <table wicket:id="relationshipsTable" class="virtual-relationships-table">
              <thead>
                <tr>
                  <th>
                    <wicket:message key="VirtualRelationshipsPanel.name">Name</wicket:message>
                  </th>
                  <th>
                    <wicket:message key="VirtualRelationshipsPanel.cardinality">Cardinality</wicket:message>
                  </th>
                  <th>
                    <wicket:message key="VirtualRelationshipsPanel.source">Source</wicket:message>
                  </th>
                  <th>
                    <wicket:message key="VirtualRelationshipsPanel.target">Target</wicket:message>
                  </th>
                  <th class="virtual-relationships-actions">
                    <wicket:message key="VirtualRelationshipsPanel.actions">Actions</wicket:message>
                  </th>
                </tr>
              </thead>
              <tbody wicket:id="relationships">
                <tr>
                  <td>
                    <span wicket:id="name"/>
                  </td>
                  <td>
                    <span wicket:id="cardinality"/>
                  </td>
                  <td>
                    <span wicket:id="source"/>
                  </td>
                  <td>
                    <span wicket:id="target"/>
                  </td>
                  <td class="virtual-relationships-actions">
                    <a href="#" wicket:id="edit" class="button outline-primary">
                      <i class="gs-icon gs-icon-edit"></i>
                      <wicket:message key="VirtualRelationshipsPanel.edit">Edit</wicket:message>
                    </a>
                    <a href="#" wicket:id="remove" class="button outline-danger">
                      <i class="gs-icon gs-icon-delete"></i>
                      <wicket:message key="VirtualRelationshipsPanel.remove">Remove</wicket:message>
                    </a>
                  </td>
                </tr>
              </tbody>
            </table>
            <div wicket:id="relationshipModal"/>
          </div>
        </fieldset>
      </div>
    </wicket:panel>
  </body>
</html>
