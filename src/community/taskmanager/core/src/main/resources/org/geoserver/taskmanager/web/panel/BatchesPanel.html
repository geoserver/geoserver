<?xml version="1.0"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-BatchesPanel">
        <div wicket:id="dialog"></div>
        <wicket:fragment wicket:id="iconFragment">
          <img wicket:id="enabledIcon" />
        </wicket:fragment>
        <div class="gs-unordered-list-class links-above-table">
          <div class="gs-list-item-class">
            <a class="button outline-primary" href="#" wicket:id="addNew">
              <i class="gs-icon gs-icon-add"></i> <wicket:message key="addNew"></wicket:message>
            </a>
          </div>
          <div class="gs-list-item-class">
            <a class="button outline-danger" href="#" wicket:id="removeSelected">
              <i class="gs-icon gs-icon-delete"></i><wicket:message key="removeSelected"></wicket:message>
            </a>
          </div>
          <div class="gs-list-item-class">
            <a class="refresh-link" href="#" wicket:id="refresh">
              <wicket:message key="refresh"></wicket:message>
            </a>
          </div>
        </div>
        <form wicket:id="form">
          <div wicket:id="batchesPanel"></div>
        </form>
      </div>
    </wicket:panel>
  </body>
</html>
