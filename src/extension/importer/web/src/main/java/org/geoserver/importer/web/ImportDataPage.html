<html xmlns:wicket="http://wicket.apache.org/">
<head>
<wicket:head>
  <wicket:link>
    <link rel="stylesheet" type="text/css" href="style.css"/>
  </wicket:link>
</wicket:head>
</head>
<body>
<wicket:extend>
  <form wicket:id="form" class="fieldset-margins">
    <fieldset>
      <legend class="border-0">1. <wicket:message key="chooseDataSource">chooseDataSource</wicket:message></legend>
      <div wicket:id="sources" id="sources">
      </div>
    </fieldset>
    <fieldset>
      <legend class="border-0">2. <wicket:message key="configureDataSource">configureDataSource</wicket:message></legend>
      <div wicket:id="panel">
        <div wicket:id="content"></div>
      </div>
    </fieldset>
    <fieldset>
      <legend class="border-0">3. <wicket:message key="specifyTarget">specifyTarget</wicket:message></legend>
      <div class="gs-form">
        <div class="gs-form-group">
          <label for="workspace"><wicket:message key="workspace">Workspace</wicket:message></label>
          <select id="workspace" wicket:id="workspace" class="w-fit"></select>
          <span wicket:id="workspaceNameContainer"><input type="text" class="w-md" wicket:id="workspaceName"></input></span>
        </div>
        <div class="gs-form-group">
          <label for="store"><wicket:message key="store">Store</wicket:message></label>
          <select id="store" wicket:id="store" class="w-fit"></select>
        </div>
      </div>
    </fieldset>

    <div class="button-group">
      <a class="button outline-primary" href="#" wicket:id="next">
        <span>Next</span>
      </a>
      <a class="button outline-danger" href="#" wicket:id="cancel">
        <span><wicket:message key="cancel"></wicket:message></span>
      </a>
      <span wicket:id="status">Working</span>
    </div>

    <fieldset>
      <legend class="clearfix border-0">
        <span class="float-start"><wicket:message key="recentImports">recentImports</wicket:message></span>
      </legend>
      <div>
        <span class="float-end">
          <div class="gs-unordered-list-class plain horizontal">
            <div class="gs-list-item-class"> <a href="#" wicket:id="remove" class="button outline-danger"><i class="gs-icon gs-icon-delete"></i><wicket:message key="remove"></wicket:message></a></div>
            <div class="gs-list-item-class border-start-0"><a href="#" wicket:id="jobs"><wicket:message key="jobs"></wicket:message>...</a></div>
          </div>
        </span>
        <div wicket:id="imports"></div>
      </div>
    </fieldset>
  </form>
  
  <div wicket:id="dialog"></div>
</wicket:extend>
</body>
</html>
