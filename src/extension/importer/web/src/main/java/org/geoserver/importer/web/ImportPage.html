<html xmlns:wicket="http://wicket.apache.org/">
<head>
<wicket:head>
  <wicket:link>
    <link rel="stylesheet" type="text/css" href="style.css"/>
  </wicket:link>
 </wicket:head>
</head>
<body>
<wicket:extend>
   <h1><wicket:message key="import"></wicket:message> <span wicket:id="id"></span></h1>

   <span class="float-end">
     <a href="#" wicket:id="raw"><wicket:message key="raw">Raw</wicket:message>...</a>
   </span>
   <div wicket:id="header">
   </div>

   <fieldset class="pt-5">
    <legend class="import-page-legend">
      <div class="import-page-legend-main">
        <span class="border-0 import-page-legend-icon" wicket:id="icon"></span>
        <span class="border-0 import-page-legend-title" wicket:id="title"></span>
      </div>
      <div class="gs-unordered-list-class plain horizontal import-page-legend-actions" wicket:id="select">
         <div class="gs-list-item-class"> Select:</div>
         <div class="gs-list-item-class border-start-0 me-1"><a href="" wicket:id="select-all"><wicket:message key="all">All</wicket:message></a></div>
         <div>|</div>
         <div class="gs-list-item-class me-1"><a href="" wicket:id="select-none"><wicket:message key="none">None</wicket:message></a></div>
         <div>|</div>
         <div class="gs-list-item-class me-1"><a href="" wicket:id="select-ready"><wicket:message key="ready">Ready</wicket:message></a></div>
       </div>
     </legend>
     <div wicket:id="tasks">
    </div>
   </fieldset>

   <div class="button-group pt-3">
     <a class="button outline-primary" href="" wicket:id="import">
       <span><wicket:message key="import"></wicket:message></span>
     </a>
     <a class="button outline-danger" href="" wicket:id="cancel">
       <span wicket:id="text"></span>
     </a>
   </div>

   <div wicket:id="dialog"></div>
</wicket:extend>
</body>
</html>
