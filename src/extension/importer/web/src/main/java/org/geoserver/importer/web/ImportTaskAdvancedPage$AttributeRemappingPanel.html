<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-ImportTaskAdvancedPage_AttributeRemappingPanel">
        <div wicket:id="remapsContainer">
          <div class="gs-unordered-list-class plain" wicket:id="remaps">
            <div class="gs-list-item-class">
              <div class="gs-form">
                <div class="gs-form-group">
                  <label for="att">Attribute</label>
                  <select name="att" wicket:id="att" class="w-fit"/>
                </div>
                <div class="gs-form-group">
                  <label for="type">Type</label>
                  <select wicket:id="type" class="w-fit"/>
                </div>
                <div class="gs-form-group">
                  <label for="dateFormat">Date Format</label>
                  <input wicket:id="dateFormat" type="text" class="w-md"/>
                </div>
                <div class="button-group">
                  <a wicket:id="apply" href="" class="button outline-primary">
                    <i class="gs-icon gs-icon-bullet-go"></i><span>
                      <wicket:message key="apply">Apply</wicket:message>
                    </span>
                  </a>
                  <a wicket:id="cancel" href="" class="button outline-danger">
                    <i class="gs-icon gs-icon-delete"></i><span>
                      <wicket:message key="cancel">Cancel</wicket:message>
                    </span>
                  </a>
                </div>
              </div>
            </div>
            <hr />
          </div>
        </div>
        <a href="" class="button outline-primary" wicket:id="add"><i class="gs-icon gs-icon-add"></i> Add</a>
      </div>
    </wicket:panel>
  </body>
</html>
