<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form name="theForm">
      <wicket:panel>
        <div class="gs-panel-MapMLLayerConfigurationPanel">
          <h3>
            <wicket:message key="mapmlSectionHeading">MapML Settings</wicket:message>
          </h3>
          <p>
            <wicket:message key="mapmlSectionDescription"></wicket:message>
          </p>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlLicenseSection">License Info</wicket:message>
              </span>
            </legend>

            <div class="gs-form">
              <div class="gs-form-group">
                <label for="licenseTitle">
                  <wicket:message key="mapmlLicenseTitle">License Title</wicket:message>
                </label>
                <input type="text" id="licenseTitle" wicket:id="licenseTitle"/>
              </div>
              <div class="gs-form-group">
                <label for="licenseLink">
                  <wicket:message key="mapmlLicenseLink">License Link</wicket:message>
                </label>
                <input type="text" id="licenseLink" wicket:id="licenseLink"/>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlTileSection">Tile Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="useTiles" type="checkbox" wicket:id="useTiles"/>
                <label for="useTiles">
                  <wicket:message key="mapmlUseTiles">Use Tiles</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>

          <div wicket:id="RemoteClientRequestsConfiguration">
            <fieldset>
              <legend>
                <span>
                  <wicket:message key="mapmlClientRequestsSection">Client Requests</wicket:message>
                </span>
              </legend>
              <div class="gs-form">
                <div class="choiceItem">
                  <input id="useRemote" wicket:id="useRemote" type="checkbox"/>
                  <label for="useRemote">
                    <wicket:message key="mapmlUseRemote">Remote</wicket:message>
                  </label>
                </div>
              </div>
            </fieldset>
          </div>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlVectorSection">Vector Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="useFeatures" wicket:id="useFeatures" type="checkbox"/>
                <label for="useFeatures">
                  <wicket:message key="mapmlUseFeatures">Use Features</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlMultiExtentSection">Sub-layer Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="multiextent" wicket:id="useMultiExtents" type="checkbox"/>
                <label for="multiextent">
                  <wicket:message key="mapmlUseMultiExtents">Expose sub-layers in layer control</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlDimensionSection">Dimension Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="dimension">
                  <wicket:message key="mapmlDimension">Dimension</wicket:message>
                </label>
                <select class="w-md" id="dimension" wicket:id="dimension"/>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlFeatureCaptionSection">Map text and attributes to &lt;featurecaption&gt;</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="featurecaptionattributes">
                  <wicket:message key="mapmlFeatureCaption">Available Attributes</wicket:message>
                </label>
                <select id="featurecaptionattributes" class="select w-md" wicket:id="featurecaptionattributes" multiple="multiple"/>
              </div>
              <div class="gs-form-group">
                <label for="featureCaptionTemplate">
                  <wicket:message key="mapmlFeatureCaptionTemplate">Feature Caption Template String (enter
                                text including ${attribute-name} placeholders for attribute names
                                [case-sensitive] in the feature caption)
                            </wicket:message>
                </label>
                <textarea id="featureCaptionTemplate" wicket:id="featureCaptionTemplate" class="field" rows="5" cols="30"></textarea>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlDefaultMimeSection">Default Mimetype</wicket:message>
              </span>
            </legend>
            <div class="featurecaptionattributes">
              <div class="gs-form-group">
                <label for="mime">
                  <wicket:message key="mapmlDefaultMime">Mime</wicket:message>
                </label>
                <select class="w-md" id="mime" wicket:id="mime"/>
              </div>
            </div>
          </fieldset>

        </div>
      </wicket:panel>
    </form>
  </body>
</html>
