<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form name="theForm">
      <wicket:panel>
        <div class="gs-panel-MapMLLayerGroupConfigurationPanel">
          <h3>
            <wicket:message key="mapmlSectionHeading">MapML Settings</wicket:message>
          </h3>
          <p>
            <wicket:message key="mapmlSectionDescription"></wicket:message>
          </p>
          
          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlLicenseSection">License Info</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="licenseTitle">
                  <wicket:message key="mapmlLicenseTitle">License Title</wicket:message>
                </label>
                <input id="licenseTitle" wicket:id="licenseTitle" type="text"/>
              </div>
              <div class="gs-form-group">
                <label for="licenseLink">
                  <wicket:message key="mapmlLicenseLink">License Link</wicket:message>
                </label>
                <input id="licenseLink" wicket:id="licenseLink" type="text"/>
              </div>
            </div>
          </fieldset>

          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlTileSection">Tile Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="useTiles" wicket:id="useTiles" type="checkbox"/>
                <label for="useTiles">
                  <wicket:message key="mapmlUseTiles">Use Tiles</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
        
          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlVectorSection">Vector Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="useFeatures" wicket:id="useFeatures" type="checkbox"/>
                <label for="useFeatures">
                  <wicket:message key="mapmlUseFeatures">Use Features</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
        
          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlMultiExtentSection">Sub-layer Config</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="choiceItem">
                <input id="multiextent" wicket:id="useMultiExtents" type="checkbox"/>
                <label for="multiextent">
                  <wicket:message key="mapmlUseMultiExtents">Expose sub-layers in layer control</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
        
          <fieldset>
            <legend>
              <span>
                <wicket:message key="mapmlDefaultMimeSection">Default Mimetype</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="mime">
                  <wicket:message key="mapmlDefaultMime">Mime</wicket:message>
                </label>
                <select class="w-md" id="mime" wicket:id="mime"/>
              </div>
            </div>
          </fieldset>
        </div>
      </wicket:panel>
    </form>
  </body>
</html>
