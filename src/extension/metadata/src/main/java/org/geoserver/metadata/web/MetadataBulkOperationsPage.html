<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:wicket="http://wicket.apache.org/">
<wicket:head>
	<wicket:link>
		<link rel="stylesheet" href="styleMetadataModule.css" type="text/css" />
	</wicket:link>
</wicket:head>
<body>
	<wicket:extend>
		<div wicket:id="dialog"></div>
		<div wicket:id="progress"></div>

		<fieldset>
			<legend>
				<wicket:message key="fixTitle" />
			</legend>
			<form class="gs-form">
				<div class="gs-form-group"><div> <wicket:message key="fixMsg"></wicket:message></div></div>
				<div>
					<button wicket:id="fix">
						<wicket:message key="fixBtn" />
					</button>
				</div>
			</form>
		</fieldset>
		<fieldset>
			<legend>
				<wicket:message key="importTitle" />
			</legend>
			<form wicket:id="formImport" class="gs-form">
				<div class="gs-form-group"> <div><wicket:message key="importMsg" /></div></div>
				<div class="gs-form-group">
					<label for="geonetworkName"><wicket:message key="geonetworkName" /></label>
					<select id="geonetworkName" wicket:id="geonetworkName" />
				</div>
				<div class="gs-form-group">
					<label for="importCsv"><wicket:message key="importCsv" /></label>
					<input wicket:id="importCsv" size="40" type="file" /></div>
				<div>
					<button wicket:id="import">
						<wicket:message key="importBtn" />
					</button>
				</div>
			</form>
		</fieldset>
		<fieldset>
			<legend>
				<wicket:message key="customTitle" />
			</legend>
			<form wicket:id="formCustom" class="gs-form">
				<div class="gs-form-group"> <div><wicket:message key="customMsg" /></div></div>
				<div class="gs-form-group">
					<label for="ruleList"><wicket:message key="ruleList" /></label>
					<input id="ruleList" type="text" wicket:id="ruleList" />
				</div>
				<div class="gs-form-group">
					<label for="customCsv"><wicket:message key="customCsv" /></label>
					<input wicket:id="customCsv" size="40" type="file" />
				</div>
				<div>
					<button wicket:id="custom">
						<wicket:message key="customBtn" />
					</button>
				</div>
			</form>
		</fieldset>
		<fieldset>
			<legend>
				<wicket:message key="clearTitle" />
			</legend>
			<form wicket:id="formClear" class="gs-form">
				<div class="gs-form-group"> <div><wicket:message key="clearMsg" /></div></div>
				<div class="choiceItem">
					<input type="checkbox" id="clearTemplates" wicket:id="clearTemplates"></input>
					<label for="clearTemplates"><wicket:message key="clearTemplates" /></label>
				</div>
				<div>
					<button wicket:id="clear">
						<wicket:message key="clearBtn" />
					</button>
				</div>
			</form>
		</fieldset>
	</wicket:extend>
</body>
</html>
