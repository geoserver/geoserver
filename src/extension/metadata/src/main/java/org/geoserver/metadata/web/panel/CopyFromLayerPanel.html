  <body>
    <wicket:panel>
      <div class="gs-panel-CopyFromLayerPanel">
        <div wicket:id="copyFromLayerDialog"></div>
        <fieldset>
          <legend>
            <span>
              <wicket:message key="header"></wicket:message>
            </span>
          </legend>
          <div class="gs-form">
            <div class="gs-input-group">
              <select wicket:id="layer"></select>
              <a class="button" href="#" wicket:id="link">
                <wicket:message key="actionCopy"></wicket:message>
              </a>
            </div>
            <span wicket:id="copyFeedback"></span>
          </div>
        </fieldset>
      </div>
    </wicket:panel>
