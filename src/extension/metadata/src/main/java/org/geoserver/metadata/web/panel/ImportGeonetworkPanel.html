<?xml version="1.0"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-ImportGeonetworkPanel">
        <div wicket:id="importDialog"></div>
        <fieldset>
          <legend>
            <span>
              <wicket:message key="header"></wicket:message>
            </span>
          </legend>
          <div class="gs-form">
            <div class="gs-input-group">
              <select wicket:id="geonetworkName" class="w-fit"></select>
              <input wicket:id="textfield" class="w-lg" type="text" />
              <a href="#" wicket:id="link" class="button">
                <wicket:message key="actionImport"></wicket:message>
              </a>
            </div>
            <span wicket:id="importFeedback"></span>
          </div>
        </fieldset>
      </div>
    </wicket:panel>
  </body>
</html>
