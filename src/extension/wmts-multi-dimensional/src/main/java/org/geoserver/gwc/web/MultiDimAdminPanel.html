<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form name="theForm">
      <wicket:panel>
        <div class="gs-panel-MultiDimAdminPanel">
          <div class="gs-unordered-list-class">
            <div class="gs-list-item-class">
              <fieldset>
                <legend>
                  <span>
                    <wicket:message key="MultiDimAdminPanel.title">multidim</wicket:message>
                  </span>
                </legend>
                <div class="gs-form">
                  <div class="gs-form-group">
                    <label for="defaultExpandLimit">
                      <wicket:message key="defaultExpandLimit">defaultExpandLimit</wicket:message>
                    </label>
                    <input id="defaultExpandLimit" type="text" wicket:id="defaultExpandLimit" class="w-md"/>
                  </div>
                  <div class="gs-form-group">
                    <label for="maxExpandLimit">
                      <wicket:message key="maxExpandLimit">maxExpandLimit</wicket:message>
                    </label>
                    <input id="maxExpandLimit" type="text" wicket:id="maxExpandLimit" class="w-md"/>
                  </div>
                </div>
              </fieldset>
            </div>
          </div>
        </div>
      </wicket:panel>
    </form>
  </body>
</html>
