<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <wicket:panel>
      <div class="gs-panel-DownloadLimitsPanel">
        <div class="gs-unordered-list-class">
          <div class="gs-list-item-class">
            <fieldset>
              <legend>
                <span>
                  <wicket:message key="wpsDownload">WPS download</wicket:message>
                </span>
              </legend>
              <div class="gs-form">
                <div class="gs-form-group">
                  <label for="maxFeatures">
                    <wicket:message key="maxFeatures">maxFeatures</wicket:message>
                  </label>
                  <input type="text" wicket:id="maxFeatures" class="w-md" />
                </div>
                <div class="gs-form-group">
                  <label for="rasterSizeLimits">
                    <wicket:message key="rasterSizeLimits">rasterSizeLimits</wicket:message>
                  </label>
                  <input type="text" wicket:id="rasterSizeLimits" class="w-md" />
                </div>
                <div class="gs-form-group">
                  <label for="writeLimits">
                    <wicket:message key="writeLimits">writeLimits</wicket:message>
                  </label>
                  <input type="text" wicket:id="writeLimits" class="w-md" />
                </div>
                <div class="gs-form-group">
                  <label for="hardOutputLimit">
                    <wicket:message key="hardOutputLimit">hardOutputLimit</wicket:message>
                  </label>
                  <input type="text" wicket:id="hardOutputLimit" class="w-md" />
                </div>
                <div class="gs-form-group">
                  <label for="maxAnimationFrames">
                    <wicket:message key="maxAnimationFrames">maxAnimationFrames</wicket:message>
                  </label>
                  <input type="text" wicket:id="maxAnimationFrames" class="w-md" />
                </div>
                <div class="gs-form-group">
                  <label for="compressionLevel">
                    <wicket:message key="compressionLevel">compressionLevel</wicket:message>
                  </label>
                  <input type="text" wicket:id="compressionLevel" class="w-md" />
                </div>
              </div>
            </fieldset>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
