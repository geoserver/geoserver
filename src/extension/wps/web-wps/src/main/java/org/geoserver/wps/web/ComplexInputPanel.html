<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-ComplexInputPanel gs-form">
        <select wicket:id="type" class="w-fit" />
        <span wicket:id="editor"/>
        <div wicket:id="subprocessPopupWindow"/>
      </div>
    </wicket:panel>
    <wicket:fragment wicket:id="text">
      <div class="gs-form">
        <select wicket:id="mime" class="w-fit" />
        <textarea wicket:id="textarea"/>
      </div>
    </wicket:fragment>
    <wicket:fragment wicket:id="vectorLayer">
      <select wicket:id="layer" class="w-fit" />
      <!-- 
      <span wicket:id="attributes"></span>
      <span>Filter</span><input type="text" wicket:id="filter"/>
       -->
    </wicket:fragment>
    <wicket:fragment wicket:id="rasterLayer">
      <select wicket:id="layer" class="w-fit" />
    </wicket:fragment>
    <wicket:fragment wicket:id="reference">
      <div class="gs-form">
        <div class="gs-form-group">
          <label>Method</label>
          <select wicket:id="method" class="w-fit" />
        </div>
        <div class="gs-form-group">
          <label>Mime type</label>
          <select wicket:id="mime" class="w-fit" />
        </div>
        <div class="gs-form-group">
          <label>URL</label>
          <input type="text" wicket:id="url"/>
        </div>
        <div class="gs-form-group" wicket:id="bodyContainer">
          <label>Body</label>
          <textarea wicket:id="body"/></div>
      </div>
   </wicket:fragment>
    <wicket:fragment wicket:id="subprocess">
      <a class="button gs-list-item-class" href="#" wicket:id="edit">Define/Edit</a>
      <textarea readonly="readonly" wicket:id="xml"/>
    </wicket:fragment>
  </body>
</html>
