<?xml version="1.0"?>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org/" xml:lang="en" lang="en">
  <body>
    <wicket:panel>
      <div class="gs-dropdown-header" role="menuitem" tabindex="0" aria-haspopup="true" aria-expanded="false">
        Developer toolbar
      </div>
      <ul class="gs-dropdown-menu gs-developer-toolbar-menu" role="menu">
        <li class="gs-dropdown-item" role="none">
          <label class="gs-developer-toolbar-toggle" title="Strips all wicket attributes and tags from the output">
            <span>Strip Wicket tags</span>
            <input id="wicketIds" type="checkbox" wicket:id="wicketIds"/>
          </label>
        </li>
        <li class="gs-dropdown-item" role="none">
          <label class="gs-developer-toolbar-toggle" title="Generates wicket:path attributes (useful for writing tests, enabled only if wicket attributes are being generated)">
            <span>Gen. Wicket paths</span>
            <input id="wicketPaths" type="checkbox" wicket:id="wicketPaths"/>
          </label>
        </li>
        <li class="gs-dropdown-item" role="none">
          <label class="gs-developer-toolbar-toggle" title="Toggle ajax debugging">
            <span>Ajax debug</span>
            <input id="ajaxDebug" type="checkbox" wicket:id="ajaxDebug"/>
          </label>
        </li>
        <li class="gs-dropdown-item" role="none">
          <a href="#" class="button" wicket:id="clearCache" title="Forces the Wicket caches to be cleared, so that localized messages will be reloaded without needing a restart" role="menuitem">
            Clear Wicket caches
          </a>
        </li>
        <li class="gs-dropdown-item" role="none">
          <a href="#" class="button" wicket:id="reload" title="Reloads the catalog and configuration from the file system" role="menuitem">
            Reload catalog/config
          </a>
        </li>
      </ul>
    </wicket:panel>
  </body>
</html>
