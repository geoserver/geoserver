<html xmlns:wicket="http://wicket.apache.org/">
<body>
<wicket:extend>
<div id="chooser" wicket:id="chooser">
  <form wicket:id="form">
    <div class="select">
			<img class="icon" src="#" wicket:id="workspace.icon" wicket:message="title:workspace"/>
			<span wicket:id="workspace"/>
	  </div>
    <div class="select">
		  <img class="icon" src="#" wicket:id="layer.icon" wicket:message="title:layer"/>
		  <span wicket:id="layer"/>
	  </div>
    <div id="refresh">
		  <a href="#" wicket:id="refresh">refresh</a>
	  </div>
  </form>
</div>

<fieldset wicket:id="administration">
	<legend><span><wicket:message key="administration">Administration</wicket:message></span></legend>
	<div wicket:id="catalogLinks"/>
	<div class="gs-form" wicket:id="adminContent">
		<span wicket:id="content"/>
	</div>
</fieldset>

<div id="welcome">
	<p>
		<span wicket:id="welcome"></span>
		<span wicket:id="belongsTo"></span>
	</p>
</div>

<div id="preview">
	<div class="gs-form" wicket:id="previewContent">
		<span wicket:id="content"/>
	</div>
</div>

<div id="services">
	<span wicket:id="serviceList"/>
</div>

<div id="capabilities">
  <h3 wicket:id="serviceCapabilities" />

  <div wicket:id="providedCaps">
    <div wicket:id="capsList" class="service-links"/>
  </div>
</div>

<wicket:fragment wicket:id="catalogLinksFragment">
	<div class="catalog-links">
		<div class="catalog-link">
			<a wicket:id="layersLink">
				<div class="catalog-link-content">
					<span wicket:id="nlayers"></span> <wicket:message key="layers">layers</wicket:message>
				</div>
			</a>
		</div>
		<div class="catalog-link">
			<a wicket:id="groupsLink">
				<div class="catalog-link-content">
					<span wicket:id="ngroups"></span> <wicket:message key="groups">groups</wicket:message>
				</div>
			</a>
		</div>
		<div class="catalog-link">
			<a wicket:id="storesLink">
				<div class="catalog-link-content">
					<span wicket:id="nstores"></span> <wicket:message key="stores">stores</wicket:message>
				</div>
			</a>
		</div>
		<div class="catalog-link">
			<a wicket:id="workspacesLink">
				<div class="catalog-link-content">
					<span wicket:id="nworkspaces"></span> <wicket:message key="workspaces">workspaces</wicket:message>
				</div>
			</a>
		</div>
	</div>
</wicket:fragment>

<p>
	<span wicket:id="footerMessage"></span> <span wicket:id="footerContact"></span>
</p>

	<wicket:fragment wicket:id="text">
		<input type="text" wicket:id="text"/>
	</wicket:fragment>

	<wicket:fragment wicket:id="select">
		<select wicket:id="select"/>
	</wicket:fragment>
	
</wicket:extend>
</body>
</html>
