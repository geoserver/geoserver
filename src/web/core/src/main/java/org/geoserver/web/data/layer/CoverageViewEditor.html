<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-CoverageViewEditor">
        <fieldset class="mt-5">
          <legend>
            <wicket:message key="bandCompositionMode">definition</wicket:message>
          </legend>
          <div class="gs-form-group">
            <select id="compositionMode" wicket:id="compositionMode" class="w-fit" />
          </div>
          <div wicket:id="bandChoiceContainer">
            <legend>
              <wicket:message key="bandSelectionMode">definition</wicket:message>
            </legend>
            <div class="band-selection-layout">
              <label class="band-selection-label" for="coveragesChoice">
                <wicket:message key="availableCoverages">Available coverages</wicket:message>
              </label>
              <div class="add-band-button"/>
              <label class="band-selection-label" for="outputBandsChoice">
                <wicket:message key="outputBandsChoice">outputBandsChoice</wicket:message>
              </label>
              <select id="coveragesChoice" wicket:id="coveragesChoice" multiple="multiple"/>
              <button class="add-band-button" wicket:id="addBand" type="submit">
                <wicket:message key="addBand">Add Band</wicket:message>
              </button>
              <select id="outputBandsChoice" wicket:id="outputBandsChoice" multiple="multiple"/>
              <div/>
              <div/>
              <div class="button-group">
                <button wicket:id="removeBands" type="submit">
                  <wicket:message key="removeBands">Remove selected bands</wicket:message>
                </button>
                <button wicket:id="removeAllBands" type="submit">
                  <wicket:message key="removeAllBands">Remove all bands</wicket:message>
                </button>
              </div>
            </div>
          </div>
          <div wicket:id="jiffleEditorContainer" class="gs-form">
            <legend>
              <wicket:message key="jiffleMode">definition</wicket:message>
            </legend>
            <div class="gs-form-group">
              <label for="availableInputs">
                <wicket:message key="availableInputs">Available Inputs</wicket:message>
              </label>
              <pre wicket:id="inputBandSummary" class="mb-2"/>
            </div>
            <div class="gs-form-group">
              <label for="jiffleOutputNameLabel">
                <wicket:message key="jiffleOutputNameLabel">Output</wicket:message>
              </label>
              <input type="text" wicket:id="jiffleOutputName" class="w-md"/>
            </div>
            <div class="gs-form-group">
              <label for="jiffleFormulaLabel">
                <wicket:message key="jiffleFormulaLabel">Output</wicket:message>
              </label>
              <textarea wicket:id="jiffleFormula" rows="40" cols="60" />
            </div>
            <div class="gs-form-group">
              <label for="referenceInput">
                <wicket:message key="referenceInput">Reference Input:</wicket:message>
              </label>
              <select wicket:id="referenceInput" class="w-fit"/>
            </div>
          </div>
          <div class="gs-form">
            <div class="choiceItem">
              <input type="checkbox" wicket:id="fillMissingBands"/>
              <label for="fillMissingBands">
                <wicket:message key="fillMissingBands">fillMissingBands</wicket:message>
              </label>
            </div>
          </div>
        </fieldset>
        <div wicket:id="heterogeneousControlsContainer">
          <fieldset wicket:id="heterogeneousControls">
            <legend>
              <wicket:message key="heterogeneousControls">Heterogeneous bands settings</wicket:message>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="envelopeCompositionType">
                  <wicket:message key="envelopeCompositionType">envelopePolicy</wicket:message>
                </label>
                <select id="envelopeCompositionType" wicket:id="envelopeCompositionType" class="w-fit" />
              </div>
              <div class="gs-form-group">
                <label for="selectedResolution">
                  <wicket:message key="selectedResolution">selectedResolution</wicket:message>
                </label>
                <select id="selectedResolution" wicket:id="selectedResolution" class="w-fit" />
              </div>
            </div>
          </fieldset>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
