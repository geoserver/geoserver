<html xmlns:wicket="http://wicket.apache.org/">
<head>
<title><wicket:message key="layerList">Layer list</wicket:message></title>
</head>
<body>
<wicket:extend>

    <form wicket:id="form">
      <div class="gs-form">
        <div></div>
        <div class="gs-form-group">
          <label for="name"><wicket:message key="name">Name</wicket:message></label>
          <input id="name" type="text" wicket:id="name" class="w-md"/>
        </div>
        <div class="gs-list-item-class">
            <label for="attributes"><wicket:message key="attributes">atts</wicket:message></label>
            <div wicket:id="attributes"></div>
        </div>
  
        <div class="button-group toolbar-sticky selfclear">
          <a href="#" class="form-button-save button primary" wicket:id="save"><wicket:message
            key="save">Save</wicket:message></a>
          <a href="#" class="form-button-cancel button outline-danger" wicket:id="cancel"><wicket:message
            key="cancel">Cancel</wicket:message></a>
        </div>
      </div>
    </form>

    <!-- Fragments used to build the page -->
	
	<wicket:fragment wicket:id="nameFragment">
		<a href="#" wicket:id="link"><span wicket:id="name"></span></a>
	</wicket:fragment>
    
    <wicket:fragment wicket:id="header">
      <div class="gs-unordered-list-class action-group">
        <div class="gs-list-item-class"> <a class="button outline-primary" href="#" wicket:id="addNew"><i class="gs-icon gs-icon-add"></i> <wicket:message key="addNew" /></a></div>
        <div class="gs-list-item-class"> <a class="button outline-danger" href="#" wicket:id="removeSelected"><i class="gs-icon gs-icon-delete"></i><wicket:message key="removeSelected" /></a></div>
      </div>
    </wicket:fragment>
    
    <wicket:fragment wicket:id="upDown">
       <span wicket:id="up"></span>
       <span wicket:id="down"></span>
    </wicket:fragment>
</wicket:extend>
</body>
</html>
