<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-RootLayerEntryPanel">
        <div class="gs-form">
          <div class="gs-form-group">
            <label>
              <wicket:message key="rootLayer">Root Layer</wicket:message>
            </label>
            <div class="gs-input-group">
              <input wicket:id="rootLayer" id="rootLayer" type="text"/>
              <a class="button" wicket:id="add">
                <i class="gs-icon gs-icon-add"></i>
                <wicket:message key="setRootLayer">Set Root Layer...</wicket:message>
              </a>
            </div>
          </div>
          <div class="gs-form-group">
            <label for="rootLayerStyle">
              <wicket:message key="rootLayerStyle">Root Layer Style</wicket:message>
            </label>
            <select wicket:id="rootLayerStyle" class="w-md"/>
          </div>
        </div>
        <div wicket:id="popup"/>
      </div>
    </wicket:panel>
  </body>
</html>
