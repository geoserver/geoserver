<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-AttributeTypeInfoEditPanel">
        <form id="attributeForm" wicket:id="attributeForm">
          <fieldset>
            <legend>
              <span>
                <wicket:message key="AttributeTypeInfoEditPanel.details">Details</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="name">
                  <wicket:message key="AttributeTypeInfoEditor.th.name">Name</wicket:message>
                </label>
                <input id="name" type="text" wicket:id="name"/>
              </div>
              <div class="gs-form-group">
                <label for="type">
                  <wicket:message key="AttributeTypeInfoEditor.th.binding">Type</wicket:message>
                </label>
                <input id="type" type="text" wicket:id="type"/>
              </div>
              <div class="gs-form-group">
                <label for="source">
                  <wicket:message key="AttributeTypeInfoEditPanel.source">Source</wicket:message>
                </label>
                <textarea id="source" wicket:id="source" class="cql"/>
              </div>
              <div class="gs-form-group">
                <label for="description">
                  <wicket:message key="AttributeTypeInfoEditor.th.description">Description</wicket:message>
                </label>
                <textarea id="description" wicket:id="description" class="cql"/>
              </div>
              <div class="choiceItem">
                <input id="nillable" type="checkbox" wicket:id="nillable"/>
                <label for="nillable">
                  <wicket:message key="AttributeTypeInfoEditPanel.nillable">Nillable</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
          <fieldset wicket:id="restrictionsContainer">
            <legend>
              <span>
                <wicket:message key="AttributeTypeInfoEditPanel.restrictions">Restrictions</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="restrictionType">
                  <wicket:message key="AttributeTypeInfoEditPanel.restrictionType">Restriction Type</wicket:message>
                </label>
                <select id="restrictionType" wicket:id="restrictionType" class="w-fit"/>
              </div>
              <div class="gs-form" wicket:id="optionsContainer">
                <div class="gs-form-group">
                  <div></div>
                  <div class="gs-input-group">
                    <select class="select w-md" wicket:id="options" size="7"/>
                    <button wicket:id="removeOption">
                      <wicket:message key="AttributeTypeInfoEditPanel.removeSelected">Remove selected</wicket:message>
                    </button>
                  </div>
                </div>
                <div class="gs-form-group">
                  <label for="newOption">
                    <wicket:message key="AttributeTypeInfoEditPanel.newOption">New Option</wicket:message>
                  </label>
                  <div class="gs-input-group">
                    <input id="newOption" type="text" wicket:id="newOption" class="w-md"/>
                    <button wicket:id="addOption">
                      <wicket:message key="AttributeTypeInfoEditPanel.addOption">Add Option</wicket:message>
                    </button>
                  </div>
                </div>
              </div>
              <div class="gs-list-item-class" wicket:id="rangeContainer">
                <div class="gs-form">
                  <div class="gs-form-group">
                    <label for="rangeMin">
                      <wicket:message key="AttributeTypeInfoEditPanel.minInclusive">Min inclusive
                                </wicket:message>
                    </label>
                    <input id="rangeMin" type="number" wicket:id="rangeMin" class="w-md"/>
                  </div>
                  <div class="gs-form-group">
                    <label for="rangeMax">
                      <wicket:message key="AttributeTypeInfoEditPanel.maxInclusive">Max inclusive
                                </wicket:message>
                    </label>
                    <input id="rangeMax" type="number" wicket:id="rangeMax" class="w-md"/>
                  </div>
                </div>
              </div>
            </div>
          </fieldset>
          <div wicket:id="dialogFeedback"/>
        </form>
      </div>
    </wicket:panel>
  </body>
</html>
