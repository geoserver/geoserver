<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head>
</head>
  <body>
    <wicket:panel>
      <div class="gs-panel-WorkspaceNewPage_WsNewInfoPanel">
        <div class="gs-form">
          <div class="gs-form-group">
            <label for="name">Name</label>
            <input wicket:id="name" id="name" type="text" size="20"/>
          </div>
          <div class="gs-form-group">
            <label for="uri">
              <wicket:message key="namespaceURI">Namespace URI</wicket:message>
            </label>
            <input wicket:id="uri" id="uri" type="text" class="w-lg"/>
            <div class="gs-instruction">
              <wicket:message key="namespaceUriAssocWithWorkspace">The namespace uri associated with this workspace</wicket:message>
            </div>
          </div>
          <div class="choiceItem">
            <input wicket:id="default" id="default" type="checkbox"/>
            <label for="default">
              <wicket:message key="defaultWorkspace">Default workspace</wicket:message>
            </label>
          </div>
          <div class="choiceItem">
            <input wicket:id="isolated" id="isolated" type="checkbox"/>
            <label for="isolated">
              <wicket:message key="isolatedWorkspace">Isolated workspace</wicket:message>
            </label>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
