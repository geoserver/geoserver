<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form>
      <wicket:panel>
        <div class="gs-panel-HTTPLayerConfig">
          <div class="gs-content-header">
            <h3 class="gs-content-header-subtitle">
              <wicket:message key="httpSettings">HTTP Header Settings</wicket:message>
            </h3>
          </div>
          <div class="gs-unordered-list-class">
            <div class="gs-list-item-class">
              <fieldset>
                <legend>
                  <span>
                    <wicket:message key="cacheSettings">Caching Settings</wicket:message>
                  </span>
                </legend>
                <div class="gs-form">
                  <div class="choiceItem">
                    <input id="cachingEnabled" wicket:id="cachingEnabled" type="checkbox"/>
                    <label for="cachingEnabled">
                      <wicket:message key="cacheResponses">Cache Responses</wicket:message>
                    </label>
                  </div>
                  <div class="gs-form-group">
                    <label for="cacheAgeMax">
                      <wicket:message key="cacheTime">Cache Time (seconds)</wicket:message>
                    </label>
                    <input class="w-md" id="cacheAgeMax" type="text" wicket:id="cacheAgeMax"/>
                  </div>
                </div>
              </fieldset>
            </div>
          </div>
        </div>
      </wicket:panel>
      <input type="submit" value="Save Changes"/>
    </form>
  </body>
</html>
