<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <fieldset>
        <legend><wicket:message key="serviceMetadata">Service Metadata</wicket:message></legend>
        <div class="gs-form">
          <div class="gs-list-item-class">
            <div wicket:id="serviceTitleAndAbstract"></div>
          </div>
          <div class="gs-form-group">
            <label><wicket:message key="maintainer">Maintainer</wicket:message></label>
            <input wicket:id="maintainer" class="field" type="text"/>
          </div>
          <div class="gs-form-group">
            <label><wicket:message key="onlineResource">Online resource</wicket:message></label>
            <input wicket:id="onlineResource" class="field" type="text"/>
          </div>
          <div class="gs-form-group">
            <label><wicket:message key="fees">Fees</wicket:message></label>
            <input wicket:id="fees" class="field" type="text"/>
          </div>
          <div class="gs-form-group">
            <label><wicket:message key="accessConstraints">Access Constraints</wicket:message></label>
            <input wicket:id="accessConstraints" class="field" type="text"/>
          </div>
          <div class="gs-form-group">
            <label><wicket:message key="serviceKeywords">Service Keywords</wicket:message></label>
            <div wicket:id="keywords"/>
          </div>
        </div>
      </fieldset>
      <div wicket:id="serviceControl"></div>
    </wicket:panel>
  </body>
</html>
