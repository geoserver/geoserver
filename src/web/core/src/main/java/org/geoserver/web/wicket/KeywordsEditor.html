<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-KeywordsEditor">
        <div wicket:id="container">
          <table wicket:id="table">
            <tr>
              <th>
                <wicket:message key="keywordValue">Keyword</wicket:message>
              </th>
              <th>
                <wicket:message key="language">Langauge</wicket:message>
              </th>
              <th>
                <wicket:message key="vocabulary">Vocabulary</wicket:message>
              </th>
              <th/>
            </tr>
            <tr wicket:id="keywords">
              <td>
                <span wicket:id="keywordBorder">
                  <input wicket:id="keyword" type="text"/>
                </span>
              </td>
              <td>
                <input wicket:id="language" type="text"/>
              </td>
              <td>
                <span wicket:id="vocabularyBorder">
                  <input wicket:id="vocabulary" type="text"/>
                </span>
              </td>
              <td>
                <a wicket:id="removeKeyword"><img wicket:id="image"/></a>
              </td>
            </tr>
          </table>
          <p wicket:id="noKeywords"/>
        </div>
        <div>
          <span>
            <button wicket:id="addKeyword">
              <wicket:message key="addKeyword">Add keyword</wicket:message>
            </button>
          </span>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
