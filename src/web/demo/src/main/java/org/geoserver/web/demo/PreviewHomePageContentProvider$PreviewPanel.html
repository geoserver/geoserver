<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
<body>
<wicket:panel>
    <h3><wicket:message key="preview">preview</wicket:message></h3>
    <div class="gs-panel-PreviewHomePageContentProvider_PreviewPanel">
        <div class="preview-filter">
            <input
                    class="preview-filter-input"
                    type="search"
                    wicket:message="placeholder:PreviewHomePageContentProvider.filterPlaceholder" />
        </div>
        <div class="gs-form" wicket:id="sections">
            <div wicket:id="section" class="gs-form-group preview-section">
                <div class="preview-section-header">
                    <label wicket:id="sectionTitle">Section</label>
                    <button
                            type="button"
                            class="preview-more-toggle"
                            aria-expanded="false"
                            wicket:message="data-expand-label:PreviewHomePageContentProvider.expandSection;data-collapse-label:PreviewHomePageContentProvider.collapseSection;aria-label:PreviewHomePageContentProvider.expandSection;title:PreviewHomePageContentProvider.expandSection">
                        <i class="gs-icon gs-icon-bullet-arrow-right"></i>
                    </button>
                </div>
                <div class="preview-section-content">
                    <div class="preview-link-items">
                        <div class="linkBlock" wicket:id="previewLink">
                            <span>
                                <a class="text-nowrap" target="_blank" href="#" wicket:id="theLink">theTitle</a>
                                <span class="preview-link-items-separator"></span>
                                <button
                                        wicket:id="copyLinkButton"
                                        type="button"
                                        class="preview-copy-button"
                                        wicket:message="title:PreviewHomePageContentProvider.copyLink;aria-label:PreviewHomePageContentProvider.copyLink">
                                    <i class="gs-icon gs-icon-copy"></i>
                                </button>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</wicket:panel>
</body>
</html>
