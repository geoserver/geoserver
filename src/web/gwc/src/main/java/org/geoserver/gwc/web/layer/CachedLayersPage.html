<html xmlns:wicket="http://wicket.apache.org/">
<head>
<title><wicket:message key="layerList">Layer list</wicket:message></title>
</head>
<body>
<wicket:extend>
    
	<div wicket:id="table"></div>
	
	<wicket:fragment wicket:id="iconFragment">
		<img wicket:id="layerIcon" />
	</wicket:fragment>
    
    <wicket:fragment wicket:id="header">
      <div class="gs-unordered-list-class action-group">
        <div class="gs-list-item-class"> <a class="button outline-primary" href="#" wicket:id="addNew"><i class="gs-icon gs-icon-add"></i><wicket:message key="addNew" /></a></div>
        <div class="gs-list-item-class"> <a class="button outline-danger" href="#" wicket:id="removeSelected"><i class="gs-icon gs-icon-delete"></i><wicket:message key="removeSelected" /></a></div>
        <div class="gs-list-item-class">
          <a class="button outline-danger" href="#" wicket:id="clearGwcLink" title="WARNING:This will clean the GWC cache completely">
            <i class="gs-icon gs-icon-clear-cache"></i>
            <wicket:message key="clearGwcLink">Empty All</wicket:message>
          </a>            
        </div>
      </div>
    </wicket:fragment>
    
    

    <!-- The fragment for the seed link -->
    <wicket:fragment wicket:id="actionsFragment">
      <div class="button-group">
        <a class="button" target="_blank" wicket:id="seedLink"></a>
        <a class="button" href="#" wicket:id="truncateLink"></a>
      </div>
    </wicket:fragment>
    
    <!--  The custom drop down with optgroups -->
    <wicket:fragment wicket:id="menuFragment">
      <select wicket:id="menu" class="tile-layers-page-menu-select">
        <option><wicket:message key="selectOne">Select one</wicket:message></option>
        <option wicket:id="previewLink"></option>
      </select>
    </wicket:fragment>
    
    <!-- the cascade delete confirmation dialog -->
    <div wicket:id="dialog"></div>
</wicket:extend>
</body>
</html>
