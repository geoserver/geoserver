<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <wicket:panel>
      <div class="gs-form gs-panel-StyleParameterFilterSubform">
        <div class="gs-form-group">
          <label>
            <wicket:message key="defaultStyle">Default Style</wicket:message>
          </label>
          <select wicket:id="defaultValue"/>
        </div>
        <div class="gs-list-item-class">
          <label>
            <wicket:message key="alternateStyles">Alternate Styles</wicket:message>
          </label>
          <div class="gs-unordered-list-class choiceList" wicket:id="styles"/>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
