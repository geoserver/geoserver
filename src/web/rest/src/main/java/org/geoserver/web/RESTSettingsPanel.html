<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <wicket:panel>
      <div class="gs-panel-RESTSettingsPanel">
        <div class="gs-unordered-list-class">
          <div class="gs-list-item-class choiceItem">
            <input id="quiet" class="field" type="checkbox" wicket:id="quiet"/>
            <label for="quiet" class="field checkbox">
              <wicket:message key="quiet">Disable Logging on REST</wicket:message>
            </label>
          </div>
          <div class="gs-list-item-class">
            <label for="rootdir" class="text">
              <wicket:message key="rootdir">Root directory path</wicket:message>
            </label>
            <input id="rootdir" class="field" type="text" wicket:id="rootdir"/>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
