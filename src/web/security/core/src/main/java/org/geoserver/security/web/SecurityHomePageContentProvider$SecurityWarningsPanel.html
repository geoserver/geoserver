<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-SecurityHomePageContentProvider_SecurityWarningsPanel">
        <p>
          <span class="warning-link" wicket:id="embeddedDataDir"/>
        </p>
        <p>
          <span class="warning-link" wicket:id="mpfile"/>
        </p>
        <p>
          <span class="warning-link" wicket:id="userpropsold"/>
        </p>
        <p>
          <span class="warning-link" wicket:id="digestEncoding"/>
        </p>
        <p>
          <span class="warning-link" wicket:id="mpmessage"/>
          <a wicket:id="mplink">
            <wicket:message key="changeIt"/>
          </a>
        </p>
        <p>
          <span class="warning-link" wicket:id="adminmessage"/>
          <a wicket:id="adminlink">
            <wicket:message key="changeIt"/>
          </a>
        </p>
        <p>
          <span wicket:id="strongEncryptionMsg"/>
        </p>
        <div wicket:id="disabledComponentsContainer">
          <p class="warning-link" wicket:id="disabledComponentsHeader"></p>
          <ul>
            <li wicket:id="disabledComponents"><span class="warning-link" wicket:id="disabledComponent"></span></li>
          </ul>
        </div>
        <div wicket:id="affectedChainsContainer">
          <p class="warning-link" wicket:id="affectedChainsHeader"></p>
          <ul>
            <li wicket:id="affectedChains"><span class="warning-link" wicket:id="affectedChain"></span></li>
          </ul>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
