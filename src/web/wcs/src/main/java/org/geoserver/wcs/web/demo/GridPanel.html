<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head>
    <title>
      <wicket:message key="title">Grid Panel</wicket:message>
    </title>
  </head>
  <body>
    <wicket:panel>
      <div class="gs-panel-GridPanel">
        <div class="gs-form">
          <div class="gs-form-group">
            <label for="minX">
              <wicket:message key="minX">minX</wicket:message>
            </label>
            <input wicket:id="minX" id="minX" type="text" size="12" class="w-md"/>
          </div>
          <div class="gs-form-group">
            <label for="minY">
              <wicket:message key="minY">Min Y</wicket:message>
            </label>
            <input wicket:id="minY" id="minY" type="text" size="12" class="w-md"/>
          </div>
          <div class="gs-form-group">
            <label for="maxX">
              <wicket:message key="maxX">Max X</wicket:message>
            </label>
            <input wicket:id="maxX" id="maxX" type="text" size="12" class="w-md"/>
          </div>
          <div class="gs-form-group">
            <label for="maxY">
              <wicket:message key="maxY">Max Y</wicket:message>
            </label>
            <input wicket:id="maxY" id="maxY" type="text" size="12" class="w-md"/>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
