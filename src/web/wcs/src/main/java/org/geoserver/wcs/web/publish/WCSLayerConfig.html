<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form name="theForm">
      <wicket:panel>
        <div class="gs-panel-WCSLayerConfig">
          <fieldset>
            <legend>
              <span>Request SRS</span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="requestSRS">
                  <wicket:message key="wcs.data.resource.requestSRS">Current Request SRS List</wicket:message>
                </label>
                <div class="gs-input-group">
                  <select id="requestSRS" class="select" wicket:id="requestSRS" multiple="multiple"/>
                  <button wicket:id="deleteSelectedRequestSRSs" type="submit">
                    <wicket:message key="wcs.data.resource.requestSRS.delete">Delete Selected</wicket:message>
                  </button>
                </div>
              </div>
              <div class="gs-form-group">
                <label for="newRequestSRS">New Request SRS</label>
                <div class="gs-input-group">
                  <input id="newRequestSRS" wicket:id="newRequestSRS" type="text"/>
                  <button wicket:id="addNewRequestSRS" type="submit">
                    <wicket:message key="wcs.data.resource.requestSRS.add">Add SRS</wicket:message>
                  </button>
                </div>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>Response SRS</span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="responseSRS">
                  <wicket:message key="wcs.data.resource.responseSRS">Current Response SRS List </wicket:message>
                </label>
                <div class="gs-input-group">
                  <select id="responseSRS" class="select" wicket:id="responseSRS" multiple="multiple"/>
                  <button wicket:id="deleteSelectedResponseSRSs" type="submit">
                    <wicket:message key="wcs.data.resource.responseSRS.delete">Delete Selected</wicket:message>
                  </button>
                </div>
              </div>
              <div class="gs-form-group">
                <label for="newRequestSRS">New Request SRS</label>
                <div class="gs-input-group">
                  <input id="newRequestSRS" wicket:id="newResponseSRS" type="text"/>
                  <button wicket:id="addNewResponseSRS" type="submit">
                    <wicket:message key="wcs.data.resource.responseSRS.add">Add SRS</wicket:message>
                  </button>
                </div>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>
                <wicket:message key="interpolationMethods">Interpolation Methods</wicket:message>
              </span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="defaultInterpolationMethod">
                  <wicket:message key="defaultInterpolationMethod">Default Interpolation Method</wicket:message>
                </label>
                <select id="defaultInterpolationMethod" wicket:id="defaultInterpolationMethod" class="w-md" />
              </div>
              <div class="gs-form-group">
                <label for="curInterpolationMethods">
                  <wicket:message key="curInterpolationMethods">Current Interpolation Methods</wicket:message>
                </label>
                <div wicket:id="interpolationMethods"/>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>Formats</span>
            </legend>
            <div class="gs-form">
              <div class="gs-form-group">
                <label for="nativeFormat">
                  <wicket:message key="wcs.data.resource.nativeFormat">Native Format</wicket:message>
                </label>
                <input id="nativeFormat" wicket:id="nativeFormat" type="text" class="w-md" />
              </div>
              <div class="gs-form-group">
                <label for="formatPalette">
                  <wicket:message key="wcs.data.resource.supportedFormats">Supported Formats</wicket:message>
                </label>
                <div wicket:id="formatPalette"/>
              </div>
            </div>
          </fieldset>
        </div>
      </wicket:panel>
      <button type="submit"/>
    </form>
  </body>
</html>
