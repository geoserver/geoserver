<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <body>
    <wicket:panel>
      <div class="gs-panel-WFSAdminPage_GMLPanel">
        <div class="gs-unordered-list-class">
          <div class="gs-list-item-class">
            <label for="srsNameStyle">
              <wicket:message key="WFSAdminPage$GMLPanel.srsStyle">SRS Style</wicket:message>
            </label>
            <select class="select" wicket:id="srsNameStyle"/>
          </div>
          <div class="gs-list-item-class">
            <div class="choiceItem">
              <input type="checkbox" wicket:id="overrideGMLAttributes"/>
              <label for="overrideAbstractFeatureTypeAttributes">
                <wicket:message key="WFSAdminPage$GMLPanel.overrideGMLAttributes">Override GML Attributes</wicket:message>
              </label>
            </div>
          </div>
          <div class="gs-list-item-class">
            <div class="choiceItem">
              <input wicket:id="forceGmlMimeType" type="checkbox"/>
              <label wicket:id="forceGmlMimeTypeLabel"/>
            </div>
          </div>
          <div class="gs-list-item-class">
            <select class="select" wicket:id="mimeTypeToForce"/>
          </div>
        </div>
      </div>
    </wicket:panel>
  </body>
</html>
