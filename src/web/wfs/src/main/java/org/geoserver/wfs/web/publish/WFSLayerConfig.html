<?xml version="1.0"?>
<html xmlns:wicket="http://wicket.apache.org/">
  <head/>
  <body>
    <form name="theForm">
      <wicket:panel>
        <div class="gs-panel-WFSLayerConfig">
          <h3>
            <wicket:message key="wfsSettings">WFS Settings</wicket:message>
          </h3>
          <fieldset>
            <legend>
              <span>
                <wicket:message key="featureSettings">Feature Settings</wicket:message>
              </span>
            </legend>
            <div class="gn-unordered-list-class">
              <div class="gn-list-item-class">
                <label for="perReqFeatureLimit">
                  <wicket:message key="perReqFeatureLimit">Per-Request feature limit</wicket:message>
                </label>
                <div wicket:id="perReqFeaturesBorder">
                  <input id="perReqFeatureLimit" wicket:id="perReqFeatureLimit" type="text"/>
                </div>
                <label for="maxDecimals">
                  <wicket:message key="maxDecimals">Maximum number of decimals</wicket:message>
                </label>
                <div wicket:id="maxDecimalsBorder">
                  <input id="maxDecimals" wicket:id="maxDecimals" type="text"/>
                </div>
                <div>
                  <div wicket:id="padWithZerosBorder" class="choiceItem">
                    <input id="padWithZeros" wicket:id="padWithZeros" type="checkbox"/>
                    <label for="padWithZeros">
                      <wicket:message key="padWithZeros">Right-pad decimals with zeros</wicket:message>
                    </label>
                  </div>
                  <div wicket:id="forcedDecimalBorder" class="choiceItem">
                    <input id="forcedDecimal" wicket:id="forcedDecimal" type="checkbox"/>
                    <label for="forcedDecimal">
                      <wicket:message key="forcedDecimal">Force decimals, don't use scientific notation</wicket:message>
                    </label>
                  </div>
                  <div wicket:id="complexToSimpleBorder" class="choiceItem">
                    <input id="complexToSimple" wicket:id="complexToSimple" type="checkbox"/>
                    <label for="complexToSimple">
                      <wicket:message key="complexToSimple">Activate complex to simple features conversion</wicket:message>
                    </label>
                  </div>
                </div>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>
                <wicket:message key="skipNumberMatchedTitle">otherSRS</wicket:message>
              </span>
              <a href="#" wicket:id="skipNumberMatchedHelp" class="help-link"/>
            </legend>
            <div class="gn-unordered-list-class choiceList">
              <div class="gn-list-item-class">
                <input id="skipNumberMatched" wicket:id="skipNumberMatched" type="checkbox"/>
                <label for="skipNumberMatched">
                  <wicket:message key="skipNumberMatched">skipNumberMatched</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>
                <wicket:message key="otherSRS">otherSRS</wicket:message>
              </span>
              <a href="#" wicket:id="otherSRSHelp" class="help-link"/>
            </legend>
            <div class="gn-unordered-list-class">
              <div class="gn-list-item-class choiceItem">
                <input id="basic-enabled" wicket:id="overridingServiceSRS" type="checkbox"/>
                <label for="basic-enabled">
                  <wicket:message key="overridingServiceSRS">overridingServiceSRS</wicket:message>
                </label>
              </div>
              <div class="gn-unordered-list-class">
                <div class="gn-list-item-class" wicket:id="otherSRSContainer">
                  <textarea class="input" rows="10" cols="30" wicket:id="srs"/>
                </div>
              </div>
            </div>
          </fieldset>
          <fieldset>
            <legend>
              <span>
                <wicket:message key="coordinatesEncodingTitle">Coordinates Encoding</wicket:message>
              </span>
              <a href="#" wicket:id="coordinatesEncodingHelp" class="help-link"/>
            </legend>
            <div class="gn-unordered-list-class choiceList">
              <div class="gn-list-item-class">
                <input id="encodeMeasures" wicket:id="encodeMeasures" type="checkbox"/>
                <label for="encodeMeasures">
                  <wicket:message key="encodeMeasures">Encode coordinates measures</wicket:message>
                </label>
              </div>
            </div>
          </fieldset>
          <div wicket:id="wfsDialog"/>
        </div>
      </wicket:panel>
    </form>
  </body>
</html>
